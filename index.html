<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Notes — Machine Learning</title>
<style>
  :root{
    --ink:#1a1a1a;
    --paper:#ffffff;
    --line:#cfcfcf;
    --box:#f4f4f2;
    --accent:#2b5d8c;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family: Georgia, 'Times New Roman', serif;
    font-size:17px;
    line-height:1.6;
    max-width:680px;
    margin:0 auto;
    padding:60px 24px 90px;
  }
  h1{
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    font-size:28px;
    margin:0 0 8px 0;
  }
  p.sub{
    color:#555;
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    font-size:15px;
    margin:0 0 44px 0;
  }
  .post-list{ list-style:none; padding:0; margin:0; }
  .post{
    display:block;
    border:1px solid var(--line);
    border-radius:6px;
    padding:20px 22px;
    margin-bottom:16px;
    text-decoration:none;
    color:var(--ink);
    transition:border-color .15s, background .15s;
  }
  .post:hover{ border-color:var(--accent); background:var(--box); }
  .post .tag{
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    font-size:11.5px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--accent);
    display:block;
    margin-bottom:8px;
  }
  .post h2{
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    font-size:19px;
    margin:0 0 8px 0;
  }
  .post p{
    margin:0;
    font-size:15px;
    color:#444;
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  }
  .post.disabled{
    opacity:0.45;
    pointer-events:none;
  }
  footer{
    margin-top:60px;
    font-size:13px;
    color:#888;
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  }
</style>
</head>
<body>

  <h1>Learning Notes</h1>
  <p class="sub">A running set of notes on machine learning fundamentals — built while working through video courses and my own handwritten derivations.</p>

      </a>
    </li>
  </ul>

  <footer>Updated as new topics are finished.</footer>

</body>
</html>
